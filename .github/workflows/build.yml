name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install NASM
        run: choco install nasm -y

      - name: Download SDL2
        shell: bash
        run: |
          curl -L https://github.com/libsdl-org/SDL/releases/download/release-2.32.6/SDL2-devel-2.32.6-mingw.zip -o sdl2.zip
          unzip sdl2.zip

      - name: Build
        shell: bash
        run: |
          export PATH="/c/Program Files/NASM:$PATH"
          SDL2_INC="SDL2-2.32.6/x86_64-w64-mingw32/include/SDL2"
          SDL2_LIB="SDL2-2.32.6/x86_64-w64-mingw32/lib"
          CFLAGS="-Os -Wall -std=c99 -flto -ffunction-sections -fdata-sections -fno-unwind-tables -fno-asynchronous-unwind-tables -I$SDL2_INC"
          nasm -f win64 src/dsp.asm -o dsp.obj
          gcc $CFLAGS -c src/main.c -o main.obj
          gcc $CFLAGS -c src/audio.c -o audio.obj
          windres src/narina.rc -o res.obj
          gcc main.obj audio.obj dsp.obj res.obj -o narina.exe \
            -L"$SDL2_LIB" -lmingw32 -lSDL2main -lSDL2 -mwindows -s -flto \
            -Wl,--gc-sections -static -lsetupapi -lole32 -loleaut32 -limm32 -lversion -lgdi32 -lwinmm -luser32

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: narina-windows
          path: narina.exe

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2
        run: brew install sdl2

      - name: Build
        run: |
          chmod +x build_mac.sh
          ./build_mac.sh

      - name: Create app bundle
        run: |
          mkdir -p Narina.app/Contents/MacOS
          mkdir -p Narina.app/Contents/Frameworks
          cp narina Narina.app/Contents/MacOS/narina
          # Bundle SDL2 dylib
          SDL2_LIB=$(otool -L narina | grep libSDL2 | awk '{print $1}')
          cp "$SDL2_LIB" Narina.app/Contents/Frameworks/libSDL2.dylib
          strip -x Narina.app/Contents/Frameworks/libSDL2.dylib
          install_name_tool -change "$SDL2_LIB" @executable_path/../Frameworks/libSDL2.dylib Narina.app/Contents/MacOS/narina
          # Info.plist
          cat > Narina.app/Contents/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>Narina</string>
            <key>CFBundleExecutable</key><string>narina</string>
            <key>CFBundleIdentifier</key><string>com.basilei0s.narina</string>
            <key>CFBundleVersion</key><string>0.1</string>
            <key>CFBundlePackageType</key><string>APPL</string>
          </dict>
          </plist>
          PLIST
          zip -r narina-macos.zip Narina.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: narina-macos
          path: narina-macos.zip

  release:
    needs: [windows, macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: narina-windows
          path: win

      - uses: actions/download-artifact@v4
        with:
          name: narina-macos
          path: mac

      - name: Prepare release files
        run: |
          mv win/narina.exe narina-windows.exe
          mv mac/narina-macos.zip narina-macos.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Portable acid techno loop generator.

            **Downloads:**
            - `narina-windows.exe` - Windows 64-bit (standalone, no installation)
            - `narina-macos.zip` - macOS app bundle (SDL2 bundled, just unzip and run)

            **Features:** 5 styles, 10 scales, 29 rhythm templates, kick/hihat/clap, time signatures, shuffle, WAV recording, tap tempo.
          files: |
            narina-windows.exe
            narina-macos.zip
